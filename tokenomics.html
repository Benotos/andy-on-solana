<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$ANDY | The Bag</title>
    <style>
        /* --- GLOBAL BUBBLY SYSTEM --- */
        :root {
            --andy-yellow: #fde028;
            --andy-purple: #5e17eb;
            --pepe-green: #4ade80;
            --bubblegum: #ff90e8;
            --cyan: #22d3ee;
            --black: #111827;
            --white: #ffffff;
            --stroke: 4px solid var(--black);
            --bouncy-shadow: 0px 8px 0px var(--black);
            --bouncy-shadow-hover: 0px 0px 0px var(--black);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        body {
            background-color: var(--pepe-green); /* Page specific color for Tokenomics */
            /* Candy-stripe background */
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 20px,
                rgba(255, 255, 255, 0.3) 20px,
                rgba(255, 255, 255, 0.3) 40px
            );
            color: var(--black);
            overflow-x: hidden;
            width: 100vw;
            min-height: 100vh;
        }

        /* --- STICKER-STYLE NAVIGATION --- */
        header {
            position: fixed;
            width: calc(100% - 40px);
            margin: 20px;
            top: 0;
            background: var(--white);
            border: var(--stroke);
            box-shadow: var(--bouncy-shadow);
            border-radius: 50px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
        }

        .logo-container {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            color: var(--andy-yellow);
            -webkit-text-stroke: 2px var(--black);
            text-shadow: 3px 3px 0 var(--andy-purple);
            transform: rotate(-3deg);
            animation: wiggle 3s infinite;
            text-decoration: none;
        }

        /* Mobile Menu Setup */
        .menu-checkbox { display: none; }
        .menu-icon {
            display: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--black);
            background: var(--andy-yellow);
            border: 3px solid var(--black);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            text-align: center;
            line-height: 40px;
            box-shadow: 0 4px 0 var(--black);
        }

        nav ul {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--black);
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        /* Highlight the active page */
        nav ul li a.active {
            background: var(--andy-yellow);
            border: 2px solid var(--black);
            transform: rotate(2deg);
        }

        nav ul li a:hover:not(.active) {
            background: var(--bubblegum);
            border: 2px solid var(--black);
            transform: translateY(-2px) rotate(-3deg);
        }

        /* --- TOKENOMICS HEADER --- */
        .token-hero {
            padding: 160px 5% 40px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: clamp(3.5rem, 8vw, 7rem);
            color: var(--white);
            -webkit-text-stroke: 3px var(--black);
            text-shadow: 6px 6px 0 var(--andy-purple), 10px 10px 0 var(--andy-yellow);
            text-transform: uppercase;
            margin-bottom: 20px;
            transform: rotate(-2deg);
            animation: floatSticker 4s ease-in-out infinite;
        }

        /* --- STATS GRID --- */
        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5% 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .stat-card {
            background: var(--white);
            border: var(--stroke);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 12px 12px 0 rgba(0,0,0,0.3);
            position: relative;
            transition: all 0.2s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(8px) scale(0.98);
            box-shadow: 0px 0px 0 rgba(0,0,0,0.3);
        }

        /* Unique rotations for that messy sticker bomb look */
        .stat-card:nth-child(1) { transform: rotate(-3deg); }
        .stat-card:nth-child(2) { transform: rotate(2deg); background: var(--andy-yellow); }
        .stat-card:nth-child(3) { transform: rotate(-2deg); background: var(--bubblegum); }

        .stat-card:nth-child(1):hover, 
        .stat-card:nth-child(2):hover, 
        .stat-card:nth-child(3):hover {
            transform: translateY(8px) rotate(0deg);
        }

        .stat-number {
            font-size: clamp(3.5rem, 6vw, 5rem);
            font-weight: 900;
            color: var(--andy-purple);
            -webkit-text-stroke: 2px var(--black);
            text-shadow: 4px 4px 0 var(--white);
            margin-bottom: 10px;
            line-height: 1;
        }

        .stat-label {
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            font-weight: 800;
            text-transform: uppercase;
            color: var(--black);
            background: var(--white);
            padding: 5px 15px;
            border: 2px solid var(--black);
            border-radius: 20px;
            display: inline-block;
            box-shadow: 4px 4px 0 var(--black);
        }

        /* --- CONTRACT ADDRESS BOX --- */
        .ca-container {
            grid-column: 1 / -1;
            background: var(--white);
            border: var(--stroke);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
            transform: rotate(1deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .ca-title {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--andy-purple);
        }

        .ca-box {
            background: var(--cyan);
            padding: 15px 25px;
            border: 3px solid var(--black);
            border-radius: 20px;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: bold;
            word-break: break-all;
            width: 100%;
            max-width: 600px;
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.1);
            /* NEW: Interactive Styles */
            cursor: pointer;
            transition: all 0.2s;
            user-select: none; /* Prevents text highlighting on double tap */
        }

        .ca-box:hover {
            transform: scale(1.02);
            background: var(--andy-yellow);
        }

        .ca-box:active {
            transform: scale(0.95); /* Squish effect when clicked */
            box-shadow: inset 8px 8px 0 rgba(0,0,0,0.2);
        }

        /* Added a spot for one of the .webp memes */
        .token-mascot {
            position: absolute;
            top: -60px;
            right: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: var(--stroke);
            background: var(--white);
            box-shadow: 6px 6px 0 var(--black);
            overflow: hidden;
            transform: rotate(15deg);
            z-index: 10;
        }

        .token-mascot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- ANIMATIONS --- */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes floatSticker {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(-1deg); }
        }

        /* --- MOBILE QUERIES --- */
        @media (max-width: 900px) {
            header {
                width: calc(100% - 20px);
                margin: 10px;
                border-radius: 20px;
            }
            .token-hero { padding-top: 140px; }
            
            /* Enable Mobile Menu */
            .menu-icon { display: block; }
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--white);
                border: var(--stroke);
                border-radius: 20px;
                padding: 20px;
                box-shadow: var(--bouncy-shadow);
                margin-top: 10px;
            }
            .menu-checkbox:checked ~ nav ul { display: flex; }

            /* Stack Grid for Mobile */
            .stats-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .stat-card:nth-child(1), .stat-card:nth-child(2), .stat-card:nth-child(3) {
                transform: rotate(0deg); /* Reset rotations so they stack nicely */
            }

            .token-mascot {
                width: 90px;
                height: 90px;
                top: -40px;
                right: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">$ANDY</a>
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="menu-icon">☰</label>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="tokenomics.html" class="active">Tokenomics</a></li>
                <li><a href="roadmap.html">Roadmap</a></li>
            </ul>
        </nav>
    </header>

    <section class="token-hero">
        <h1 class="page-title">THE BAG</h1>
    </section>

    <section class="stats-container">
        
        <div class="stat-card">
            <div class="token-mascot">
                <img src="meme16.webp" alt="Andy Money Meme">
            </div>
            <div class="stat-number">0%</div>
            <div class="stat-label">Buy / Sell Tax</div>
        </div>

        <div class="stat-card">
            <div class="stat-number">100%</div>
            <div class="stat-label">LP Locked</div>
        </div>

        <div class="stat-card">
            <div class="stat-number">R.</div>
            <div class="stat-label">Renounced</div>
        </div>

        <div class="ca-container">
            <div class="ca-title">Contract Address</div>
            <div class="ca-box" id="ca-box" onclick="copyCA()">
                TBA_OR_PASTE_CA_HERE
            </div>
            <p style="font-weight: 700; color: rgba(0,0,0,0.6); margin-top: 10px;">Tap the address to copy. Don't get rugged by fakes.</p>
        </div>

    </section>
    <script>
        function copyCA() {
            // NOTE: Put your actual contract address inside these quotes once you launch!
            const actualCA = "TBA_OR_PASTE_CA_HERE"; 
            
            const caBox = document.getElementById("ca-box");
            
            // Copies to the user's clipboard
            navigator.clipboard.writeText(actualCA).then(() => {
                // Visual Feedback
                caBox.innerText = "COPIED TO CLIPBOARD! 🚀";
                caBox.style.background = "var(--pepe-green)";
                caBox.style.color = "var(--white)";
                caBox.style.transform = "scale(1.05) rotate(-2deg)";
                
                // Resets back to normal after 2 seconds
                setTimeout(() => {
                    caBox.innerText = actualCA;
                    caBox.style.background = ""; // Resets to CSS default
                    caBox.style.color = "";
                    caBox.style.transform = "";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>

</body>
</html>
